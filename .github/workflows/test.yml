name: WinRAR Install and Extract Test

on:
  workflow_dispatch:

jobs:
  winrar-test:
    runs-on: windows-latest
    steps:
      - name: Checkout Test Repository
        uses: actions/checkout@v4

      - name: Download WinRAR Installer
        shell: powershell
        run: |
          Write-Output "Downloading WinRAR..."
          Invoke-WebRequest -Uri "https://www.win-rar.com/fileadmin/winrar-versions/winrar/winrar-x64-723.exe" -OutFile "winrar-installer.exe"
          Write-Output "WinRAR Installer downloaded."

      - name: Install WinRAR Silently
        shell: powershell
        run: |
          Write-Output "Installing WinRAR..."
          Start-Process -FilePath "winrar-installer.exe" -ArgumentList "/S" -Wait
          
          $unrar = "C:\Program Files\WinRAR\unrar.exe"
          if (Test-Path $unrar) {
              Write-Output "WinRAR successfully installed at $unrar"
          } else {
              Write-Error "WinRAR installation failed: unrar.exe not found."
              exit 1
          }

      - name: Set up Git LFS and Clone Apose26
        shell: powershell
        env:
          APOSE_PAT: ${{ secrets.APOSE26_PAT }}
        run: |
          Write-Output "Setting up Git LFS..."
          git config --global filter.lfs.required true
          git config --global filter.lfs.clean "git-lfs clean -- %f"
          git config --global filter.lfs.smudge "git-lfs smudge -- %f"
          git config --global filter.lfs.process "git-lfs filter-process"
          git lfs install
          
          Write-Output "Cloning Apose26 private repository..."
          git clone "https://$($env:APOSE_PAT)@github.com/Hossein558/Apose26.git" apose-repo

      - name: Extract and Verify RAR Files
        shell: powershell
        env:
          RAR_PASSWORD: ${{ secrets.RAR_PASSWORD }}
        run: |
          $unrar = "C:\Program Files\WinRAR\unrar.exe"
          $rarFiles = Get-ChildItem -Path "apose-repo" -Filter "*.rar"
          $hasError = $false
          
          foreach ($file in $rarFiles) {
              Write-Output "=================================================="
              Write-Output "Testing & Extracting: $($file.Name)"
              
              # ایجاد مسیر استخراج با مسیر مطلق
              $outDir = Join-Path (Get-Location).Path "extracted\$($file.BaseName)"
              New-Item -ItemType Directory -Force -Path $outDir | Out-Null
              
              # راهحل قطعی فاصلهها: ورود به پوشه مقصد و اجرای اکسترکت در همان پوشه
              Push-Location $outDir
              & $unrar x "-p$($env:RAR_PASSWORD)" "$($file.FullName)"
              $exitCode = $LASTEXITCODE
              Pop-Location
              
              if ($exitCode -ne 0) {
                  Write-Error "Extraction FAILED for $($file.Name) with exit code $exitCode"
                  $hasError = $true
              } else {
                  Write-Output "Extraction SUCCESS for $($file.Name)"
              }
          }
          
          if ($hasError) {
              exit 1
          }

      - name: License Verification via C# Reflection
        shell: powershell
        run: |
          # تعریف تستر C# به صورت درونخطی و لود کردن آن در پاورشل
          $source = @"
          using System;
          using System.Reflection;
          using System.IO;
          using System.Linq;

          public class AsposeValidator {
              public static bool Validate(string dllPath, string licPath) {
                  try {
                      Assembly asm = Assembly.LoadFrom(dllPath);
                      
                      // یافتن داینامیک کلاس License
                      Type licType = asm.GetTypes().FirstOrDefault(t => t.Name == "License" && t.IsClass);
                      if (licType == null) {
                          Console.WriteLine("[-] Class 'License' not found in DLL.");
                          return false;
                      }
                      
                      object licObj = Activator.CreateInstance(licType);
                      MethodInfo setLicMethod = licType.GetMethod("SetLicense", new Type[] { typeof(string) });
                      
                      if (setLicMethod == null) {
                          Console.WriteLine("[-] Method 'SetLicense' not found.");
                          return false;
                      }
                      
                      // اعمال لایسنس
                      setLicMethod.Invoke(licObj, new object[] { licPath });
                      return true;
                  } catch (Exception ex) {
                      Exception inner = ex.InnerException != null ? ex.InnerException : ex;
                      Console.WriteLine("[-] Exception during validation: " + inner.Message);
                      return false;
                  }
              }
          }
          "@
          
          Add-Type -TypeDefinition $source

          $baseExtractedDir = (Get-Item "extracted").FullName
          $packages = Get-ChildItem -Path $baseExtractedDir -Directory
          $hasError = $false

          foreach ($pkg in $packages) {
              Write-Output "`n=================================================="
              Write-Output "Validating License for: $($pkg.Name)"
              
              # پیدا کردن فایل لایسنس استخراج شده
              $licFile = Get-ChildItem -Path $pkg.FullName -Recurse -Filter "*.lic" | Select-Object -First 1
              
              # نکته حیاتی: الزام به استفاده از نسخههای net4 یا net40 داتنت برای جلوگیری از کرش BadImageFormatException
              $dllFile = Get-ChildItem -Path $pkg.FullName -Recurse -Filter "Aspose.*.dll" | Where-Object { $_.DirectoryName -match "net4|net3|net2" } | Select-Object -First 1
              
              if (-not $dllFile) {
                  $dllFile = Get-ChildItem -Path $pkg.FullName -Recurse -Filter "Aspose.*.dll" | Select-Object -First 1
              }

              if ($licFile -and $dllFile) {
                  Write-Output "-> Testing DLL: $($dllFile.FullName)"
                  
                  $success = [AsposeValidator]::Validate($dllFile.FullName, $licFile.FullName)
                  
                  if ($success) {
                      Write-Output "[+] SUCCESS: License is strictly valid and accepted dynamically!"
                  } else {
                      Write-Error "[-] FAILED: Crack invalid or license rejected!"
                      $hasError = $true
                  }
              } else {
                  Write-Error "[-] Required DLL or License file missing!"
                  $hasError = $true
              }
          }

          if ($hasError) {
              exit 1
          } else {
              Write-Output "`n[+] ALL ASPOSE PACKAGES VALIDATED SUCCESSFULLY!"
          }
